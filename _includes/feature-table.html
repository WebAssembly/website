<link rel="preload" href="/features.json" as="fetch">
<link rel="modulepreload" href="https://unpkg.com/wasm-feature-detect@1/dist/esm/index.js?v=1">
<script type="module" src="/features.js"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.15/dist/cdn.js" defer></script><!-- TODO: use minimized version -->

<div id="feature-table" x-data x-bind:style="{ 'color-scheme': $store.colorScheme }" x-bind:data-color-scheme="$store.colorScheme">
  <template shadowrootmode="open" shadowroot="open">
    <style>:host { all: initial; font-family: inherit; }</style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/modern-normalize@3/modern-normalize.min.css">
    <link rel="stylesheet" href="/css/feature-table.css">
    <table x-data="data" x-cloak x-show="featureGroups.length" x-bind:style="{ '--num-columns': numColumns }">
      <thead>
        <tr>
          <th></th>
          <th scope="col">Your browser</th>
          <template x-for="(platform, platformName) in platforms">
            <th scope="col">
              <a x-bind:href="platform.url" target="_blank">
                <!-- Empty alt trick: https://www.w3.org/WAI/WCAG22/Techniques/html/H2 -->
                <img x-bind:src="platform.logo" alt="">
                <br>
                <span x-text="platformName"></span>
              </a>
            </th>
          </template>
        </tr>
      </thead>
      <template x-for="featureGroup in featureGroups">
        <tbody>
          <tr>
            <th scope="colgroup" x-bind:colspan="numColumns" x-text="featureGroup.name"></th>
          </tr>
          <template x-for="feature in featureGroup.features">
            <tr>
              <th scope="row">
                <a x-bind:href="feature.url" x-text="feature.description" target="_blank"></a>
              </th>
              <td x-bind:class="classForStatus(yourBrowser[feature.id])">
                <div x-html="yourBrowser[feature.id] ? iconForStatus(yourBrowser[feature.id]) : iconWhenLoading"></div>
                <div x-show="labelForStatus(yourBrowser[feature.id])" x-text="labelForStatus(yourBrowser[feature.id])"></div>
              </td>
              <template x-for="status in Object.values(platforms).map(p => p.features[feature.id])">
                <td x-bind:class="classForStatus(status)">
                  <div x-html="iconForStatus(status)"></div>
                  <div x-show="labelForStatus(status)" x-text="labelForStatus(status)"></div>
                  <div x-show="status.note" class="icon-note" x-html="iconForNote"></div>
                </td>
              </template>
            </tr>
          </template>
        </tbody>
      </template>
    </table>
  </template>
</div>
